name: Lambda Tools Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stg
          - prod
      ref:
        description: 'Branch or commit to deploy from'
        required: false
        default: 'main'
        type: string

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  deploy:
    name: Deploy Lambda Tools Stack
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'iac/package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
          role-session-name: GitHubActions-LambdaToolsDeploy-${{ github.event.inputs.environment }}

      - name: Install CDK dependencies
        run: |
          cd iac
          npm install

      - name: Bootstrap CDK (if needed)
        run: |
          cd iac
          ENVIRONMENT=${{ github.event.inputs.environment }}
          npx cdk bootstrap \
            --app "npx ts-node --prefer-ts-exts bin/lambda-tools-ecr.ts" \
            --context environment=$ENVIRONMENT \
            --context projectName=${{ env.PROJECT_NAME }} \
            || true

      # Phase 1: Create ECR repositories only
      - name: Deploy ECR repositories
        run: |
          cd iac
          ENVIRONMENT=${{ github.event.inputs.environment }}
          npx cdk deploy \
            --app "npx ts-node --prefer-ts-exts bin/lambda-tools-ecr.ts" \
            --context environment=$ENVIRONMENT \
            --context projectName=${{ env.PROJECT_NAME }} \
            --require-approval never

      # Phase 2: Build and push container images to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container tool images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          TOOLS=("video-combine" "sample-video")

          for TOOL in "${TOOLS[@]}"; do
            REPO="${{ env.PROJECT_NAME }}-${ENVIRONMENT}-tools-${TOOL}"
            IMAGE_URI="${ECR_REGISTRY}/${REPO}:latest"

            echo "=== Building $TOOL ==="
            docker build -t "$IMAGE_URI" "lambda-tools/${TOOL}/"
            docker push "$IMAGE_URI"
            echo "✓ Pushed $IMAGE_URI"
          done

      # Phase 3: Deploy full stack with Lambda functions (images now exist in ECR)
      - name: Deploy CDK stack with Lambda functions
        run: |
          cd iac
          ENVIRONMENT=${{ github.event.inputs.environment }}
          npx cdk deploy \
            --app "npx ts-node --prefer-ts-exts bin/lambda-tools.ts" \
            --context environment=$ENVIRONMENT \
            --context projectName=${{ env.PROJECT_NAME }} \
            --require-approval never

      # Update Lambda functions to use the newly pushed images
      - name: Update Lambda function images
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          TOOLS=("video-combine" "sample-video")

          for TOOL in "${TOOLS[@]}"; do
            REPO="${{ env.PROJECT_NAME }}-${ENVIRONMENT}-tools-${TOOL}"
            IMAGE_URI="${ECR_REGISTRY}/${REPO}:latest"
            FUNCTION_NAME="${{ env.PROJECT_NAME }}-${ENVIRONMENT}-tools-${TOOL}"

            echo "=== Updating Lambda $FUNCTION_NAME ==="
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --image-uri "$IMAGE_URI" \
              --region ${{ env.AWS_REGION }}
            echo "✓ Updated $FUNCTION_NAME"
          done

      - name: Get stack outputs
        run: |
          STACK_NAME="${{ env.PROJECT_NAME }}-${{ github.event.inputs.environment }}-lambda-tools"
          echo "=== Stack Outputs ==="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
