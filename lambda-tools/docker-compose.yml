version: '3.8'

services:
  math-lambda:
    build: ./math
    ports:
      - "9001:8080"
    networks:
      - app-network

  sample-video-lambda:
    build: ./sample-video
    ports:
      - "9003:8080"
    environment:
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_ENDPOINT_URL=http://go-google-auth-minio:9000
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:9000
      - S3_URL_REWRITE_FROM=http://localhost:9000
      - S3_URL_REWRITE_TO=http://go-google-auth-minio:9000
      - TOOLS_S3_BUCKET=${TOOLS_S3_BUCKET:-lambda-tools-videos}
      - PRESIGNED_URL_EXPIRY=${PRESIGNED_URL_EXPIRY:-86400}
    networks:
      - app-network

  video-combine-lambda:
    build: ./video-combine
    ports:
      - "9002:8080"
    environment:
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_ENDPOINT_URL=http://go-google-auth-minio:9000
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:9000
      - S3_URL_REWRITE_FROM=http://localhost:9000
      - S3_URL_REWRITE_TO=http://go-google-auth-minio:9000
      - TOOLS_S3_BUCKET=${TOOLS_S3_BUCKET:-lambda-tools-videos}
      - PRESIGNED_URL_EXPIRY=${PRESIGNED_URL_EXPIRY:-3600}
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: backend_app-network
